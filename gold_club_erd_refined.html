<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  MEMBERS ||--o{ POSTS : writes
  MEMBERS ||--o{ REACTIONS : creates
  MEMBERS ||--o{ COMMENTS : writes
  MEMBERS ||--o{ PROJECTS : leads
  MEMBERS ||--o{ MEETINGS : attends
  MEMBERS ||--o{ RESOURCES : uploads
  MEMBERS ||--o{ FUND_LEDGER : records
  PROJECTS ||--o{ POSTS : "updates(ongoing)"
  PROJECTS ||--o{ RESOURCES : "archived_to(approved)"
  MEETINGS ||--o{ POSTS : "becomes(optional)"
  RESOURCES ||--o{ POSTS : "notifies(via)"
  FUND_LEDGER ||--o{ POSTS : "updates(monthly)"
  POSTS ||--o{ COMMENTS : has
  POSTS ||--o{ REACTIONS : receives
  
  MEMBERS {
    string id PK
    string name
    string role "회장, 부회장, 부원"
    string status_message
    string avatar
    timestamp created_at
  }
  
  PROJECTS {
    string id PK
    string title
    string type "논문, 개발, 공모전"
    string description
    string lead_id FK
    string approval_status "진행중, 검토대기, 승인, 거절"
    string approved_by FK "회장/부회장"
    int progress_percentage
    timestamp start_date
    timestamp completion_date
    timestamp created_at
  }
  
  MEETINGS {
    string id PK
    string title
    string agenda
    string status "계획, 진행중, 완료"
    string notes
    array participant_ids FK
    timestamp date
    string location_or_link
    timestamp created_at
  }
  
  RESOURCES {
    string id PK
    string title
    string type "상장, 활동사진, 프로젝트, 스터디자료"
    string description
    string file_url
    string category
    string source_project_id FK "optional(프로젝트에서 온 경우)"
    string uploader_id FK
    string approved_by FK "회장/부회장"
    timestamp created_at
  }
  
  FUND_LEDGER {
    string id PK
    string type "수입, 지출"
    int amount
    string category "회비, 활동비, 상품비"
    string description
    timestamp date
    int balance
    string recorded_by FK
    timestamp created_at
  }
  
  POSTS {
    string id PK
    string author_id FK
    string project_id FK "optional(진행중)"
    string meeting_id FK "optional"
    string resource_id FK "optional(자료 추가시)"
    string fund_ledger_id FK "optional"
    string title
    string category "공지, 프로젝트, 회의, 자료, 재정"
    string content
    int view_count
    int comment_count
    timestamp created_at
  }
  
  REACTIONS {
    string id PK
    string post_id FK
    string user_id FK
    string reaction_type "✓, 👍, ❤️"
    int count
    timestamp created_at
  }
  
  COMMENTS {
    string id PK
    string post_id FK
    string user_id FK
    string content
    timestamp created_at
  }`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
